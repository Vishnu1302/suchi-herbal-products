<svg width="340" height="88" viewBox="0 0 340 88" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Horizontal metallic sweep: dark→bright→dark for a struck-gold feel -->
    <linearGradient id="gm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c9a227"/>
      <stop offset="22%"  stop-color="#e6c76a"/>
      <stop offset="50%"  stop-color="#f0d060"/>
      <stop offset="78%"  stop-color="#e6c76a"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <!-- Softer version for tagline / decorative elements -->
    <linearGradient id="gm2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5a4008" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#c9a227" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#e6c76a"/>
      <stop offset="70%"  stop-color="#c9a227" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5a4008" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle glow behind AUREA text -->
    <filter id="glow" x="-8%" y="-40%" width="116%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main wordmark -->
  <text
    x="170" y="52"
    text-anchor="middle"
    font-family="'Trajan Pro','Big Caslon','Palatino Linotype','Palatino','Book Antiqua',Georgia,serif"
    font-size="50"
    font-weight="400"
    letter-spacing="12"
    fill="url(#gm)"
    filter="url(#glow)">AUREA</text>

  <!-- Decorative rule — left -->
  <line x1="18" y1="66" x2="136" y2="66" stroke="url(#gm2)" stroke-width="0.8"/>
  <!-- Diamond accent -->
  <polygon points="170,62 174,66 170,70 166,66"
    fill="url(#gm)" opacity="0.92"/>
  <!-- Decorative rule — right -->
  <line x1="204" y1="66" x2="322" y2="66" stroke="url(#gm2)" stroke-width="0.8"/>

  <!-- Tagline -->
  <text
    x="170" y="82"
    text-anchor="middle"
    font-family="'Trajan Pro','Palatino Linotype',Georgia,serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5"
    fill="#c9a227"
    opacity="0.88">THE GLOW WITHIN</text>
</svg>