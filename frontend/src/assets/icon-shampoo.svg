<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Cylindrical amber body — left/right darker, centre bright (translucent cylinder) -->
    <linearGradient id="sh-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5A2E00" stop-opacity="0.72"/>
      <stop offset="18%"  stop-color="#C88214" stop-opacity="0.60"/>
      <stop offset="44%"  stop-color="#F0C840" stop-opacity="0.64"/>
      <stop offset="68%"  stop-color="#C88214" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#5A2E00" stop-opacity="0.72"/>
    </linearGradient>
    <!-- Shoulder/neck gradient (narrower) -->
    <linearGradient id="sh-neck" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5A2E00" stop-opacity="0.75"/>
      <stop offset="50%"  stop-color="#E8B830" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#5A2E00" stop-opacity="0.75"/>
    </linearGradient>
    <!-- Internal glow (light passing through the liquid inside) -->
    <radialGradient id="sh-glow" cx="42%" cy="55%" r="48%">
      <stop offset="0%"   stop-color="#FFE8A0" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#D49010" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#5A2E00" stop-opacity="0"/>
    </radialGradient>
    <!-- Cap gradient -->
    <linearGradient id="sh-cap" x1="15%" y1="10%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#FFE090" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#C07810" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#6A3800" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="sh-drop" x="-12%" y="-6%" width="124%" height="118%">
      <feDropShadow dx="2" dy="8" stdDeviation="8" flood-color="#3A1400" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- ── Bottle body (wider rounded bottom, tapers at shoulder) ── -->
  <path d="
    M68 178
    Q48 174 46 154
    L44 92
    Q44 78 56 72
    L60 48
    Q68 26 100 26
    Q132 26 140 48
    L144 72
    Q156 78 156 92
    L154 154
    Q152 174 132 178
    Z"
    fill="url(#sh-body)" filter="url(#sh-drop)"/>
  <!-- Internal light glow (translucency) -->
  <path d="
    M68 178
    Q48 174 46 154
    L44 92
    Q44 78 56 72
    L60 48
    Q68 26 100 26
    Q132 26 140 48
    L144 72
    Q156 78 156 92
    L154 154
    Q152 174 132 178
    Z"
    fill="url(#sh-glow)"/>
  <!-- Body border -->
  <path d="
    M68 178
    Q48 174 46 154
    L44 92
    Q44 78 56 72
    L60 48
    Q68 26 100 26
    Q132 26 140 48
    L144 72
    Q156 78 156 92
    L154 154
    Q152 174 132 178
    Z"
    fill="none" stroke="#C9A020" stroke-width="1.4" stroke-opacity="0.78"/>

  <!-- Left edge highlight (cylindrical sheen) -->
  <path d="M48 96 L46 148 Q46 162 52 170"
        stroke="rgba(255,240,160,0.32)" stroke-width="4"
        stroke-linecap="round" fill="none"/>
  <!-- Top shoulder sheen -->
  <path d="M58 74 Q80 66 100 65 Q120 66 142 74"
        stroke="rgba(255,248,200,0.40)" stroke-width="2"
        stroke-linecap="round" fill="none"/>

  <!-- Label rectangle with rounded corners -->
  <rect x="60" y="98" width="80" height="52" rx="9"
        fill="rgba(212,175,55,0.11)" stroke="rgba(212,175,55,0.45)" stroke-width="0.9"/>
  <!-- Leaf on label -->
  <path d="M100 108 Q112 120 100 134 Q88 120 100 108 Z"
        fill="rgba(212,175,55,0.26)" stroke="rgba(212,175,55,0.65)" stroke-width="0.9"/>
  <line x1="100" y1="108" x2="100" y2="134"
        stroke="rgba(212,175,55,0.50)" stroke-width="0.8"/>
  <path d="M100 116 Q107 119 105 124"
        stroke="rgba(212,175,55,0.40)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M100 116 Q93 119 95 124"
        stroke="rgba(212,175,55,0.40)" stroke-width="0.7" stroke-linecap="round" fill="none"/>

  <!-- Liquid surface wave -->
  <path d="M52 166 Q76 162 100 165 Q124 162 148 166"
        stroke="rgba(255,215,60,0.32)" stroke-width="1.2"
        stroke-linecap="round" fill="none"/>

  <!-- ── Neck ── -->
  <rect x="82" y="10" width="36" height="20" rx="7"
        fill="url(#sh-neck)" stroke="#C9A020" stroke-width="1.1"/>
  <!-- Neck top highlight -->
  <path d="M86 13 Q100 10 114 13"
        stroke="rgba(255,242,160,0.50)" stroke-width="1.5"
        stroke-linecap="round" fill="none"/>

  <!-- ── Flip cap ── -->
  <rect x="78" y="2" width="44" height="14" rx="6"
        fill="url(#sh-cap)" stroke="#C9A020" stroke-width="1.1"/>
  <!-- Cap highlight -->
  <path d="M82 5 Q100 3 118 5"
        stroke="rgba(255,248,200,0.42)" stroke-width="1.2"
        stroke-linecap="round" fill="none"/>
</svg>
