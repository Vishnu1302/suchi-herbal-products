<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Cylindrical tube: dark left/right, bright centre -->
    <linearGradient id="gel-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5A2E00" stop-opacity="0.74"/>
      <stop offset="18%"  stop-color="#C88214" stop-opacity="0.62"/>
      <stop offset="50%"  stop-color="#F2CC48" stop-opacity="0.66"/>
      <stop offset="82%"  stop-color="#C88214" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#5A2E00" stop-opacity="0.74"/>
    </linearGradient>
    <!-- Shoulder / cap band -->
    <linearGradient id="gel-cap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6A3800" stop-opacity="0.88"/>
      <stop offset="46%"  stop-color="#E8B820" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#6A3800" stop-opacity="0.88"/>
    </linearGradient>
    <!-- Crimp fold row gradient (gets successively darker/narrower) -->
    <linearGradient id="gel-crimp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3A1400" stop-opacity="0.70"/>
      <stop offset="50%"  stop-color="#C07810" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3A1400" stop-opacity="0.70"/>
    </linearGradient>
    <!-- Internal gel glow (gel is slightly cloudy — warmer glow) -->
    <radialGradient id="gel-glow" cx="44%" cy="48%" r="46%">
      <stop offset="0%"   stop-color="#FFE080" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#8A4A00" stop-opacity="0"/>
    </radialGradient>
    <filter id="gel-drop" x="-12%" y="-6%" width="124%" height="118%">
      <feDropShadow dx="2" dy="8" stdDeviation="8" flood-color="#3A1400" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- ═══ TUBE BODY (flat-bottomed cylinder, rounded shoulder top) ═══ -->
  <path d="M62 156 L62 82 Q62 60 74 54 L126 54 Q138 60 138 82 L138 156 Z"
        fill="url(#gel-body)" filter="url(#gel-drop)"/>
  <!-- Internal gel glow -->
  <path d="M62 156 L62 82 Q62 60 74 54 L126 54 Q138 60 138 82 L138 156 Z"
        fill="url(#gel-glow)"/>
  <!-- Body border -->
  <path d="M62 156 L62 82 Q62 60 74 54 L126 54 Q138 60 138 82 L138 156 Z"
        fill="none" stroke="#C9A020" stroke-width="1.4" stroke-opacity="0.80"/>

  <!-- Left cylindrical sheen -->
  <path d="M66 86 L64 148"
        stroke="rgba(255,240,150,0.30)" stroke-width="4.5"
        stroke-linecap="round" fill="none"/>
  <!-- Shoulder crescent sheen -->
  <path d="M66 62 Q84 56 100 55 Q116 56 134 62"
        stroke="rgba(255,248,195,0.38)" stroke-width="1.8"
        stroke-linecap="round" fill="none"/>

  <!-- Label rectangle -->
  <rect x="72" y="80" width="56" height="50" rx="7"
        fill="rgba(212,175,55,0.10)" stroke="rgba(212,175,55,0.40)" stroke-width="0.9"/>
  <!-- Leaf on label -->
  <path d="M100 90 Q112 105 100 120 Q88 105 100 90 Z"
        fill="rgba(212,175,55,0.24)" stroke="rgba(212,175,55,0.62)" stroke-width="0.9"/>
  <line x1="100" y1="90" x2="100" y2="120"
        stroke="rgba(212,175,55,0.50)" stroke-width="0.8"/>
  <path d="M100 98 Q107 102 105 107"
        stroke="rgba(212,175,55,0.38)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M100 98 Q93 102 95 107"
        stroke="rgba(212,175,55,0.38)" stroke-width="0.7" stroke-linecap="round" fill="none"/>

  <!-- ═══ CRIMPED BOTTOM FOLDS ═══ -->
  <!-- Fold 1 (widest, just below body) -->
  <rect x="62" y="156" width="76" height="7" rx="2"
        fill="url(#gel-crimp)" stroke="rgba(212,175,55,0.35)" stroke-width="0.8"/>
  <!-- Fold 2 (10% narrower) -->
  <rect x="65" y="165" width="70" height="6" rx="2"
        fill="url(#gel-crimp)" stroke="rgba(212,175,55,0.30)" stroke-width="0.8"/>
  <!-- Fold 3 (narrowest, sealed tip) -->
  <rect x="69" y="173" width="62" height="5" rx="2"
        fill="url(#gel-crimp)" stroke="rgba(212,175,55,0.25)" stroke-width="0.8"/>
  <!-- Crimped-end tip arc (the very bottom sealed edge) -->
  <path d="M73 178 Q100 183 127 178"
        stroke="rgba(180,120,10,0.38)" stroke-width="1.2"
        stroke-linecap="round" fill="none"/>

  <!-- ═══ SCREW NOZZLE CAP ═══ -->
  <!-- Neck -->
  <rect x="82" y="42" width="36" height="16" rx="6"
        fill="url(#gel-cap)" stroke="#C9A020" stroke-width="1.1"/>
  <path d="M86 45 Q100 43 114 45"
        stroke="rgba(255,242,160,0.50)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <!-- Nozzle tip (small cylinder) -->
  <rect x="90" y="30" width="20" height="16" rx="5"
        fill="url(#gel-cap)" stroke="#C9A020" stroke-width="1.1"/>
  <!-- Tiny dispensing hole hint at top -->
  <ellipse cx="100" cy="30" rx="3.5" ry="2"
           fill="rgba(60,20,0,0.50)" stroke="#C9A020" stroke-width="0.8"/>
  <!-- Nozzle highlight -->
  <path d="M93 33 Q100 31 107 33"
        stroke="rgba(255,242,160,0.46)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
</svg>
