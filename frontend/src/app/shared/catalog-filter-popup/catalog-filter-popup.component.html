<!-- Trigger button -->
<button
  class="filter-trigger"
  (click)="toggle()"
  type="button"
  [class.filter-trigger--active]="isOpen()"
>
  <svg
    width="18"
    height="18"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <line x1="4" y1="6" x2="20" y2="6" />
    <line x1="8" y1="12" x2="16" y2="12" />
    <line x1="11" y1="18" x2="13" y2="18" />
  </svg>
  <span>Filters</span>
</button>

<!-- Backdrop -->
<div class="filter-backdrop" *ngIf="isOpen()" (click)="close()"></div>

<!-- Popup panel -->
<div
  class="filter-popup"
  [class.filter-popup--open]="isOpen()"
  [formGroup]="filterForm"
  role="dialog"
  aria-label="Filters"
>
  <div class="filter-popup__header">
    <span class="filter-popup__title">Filters & Sort</span>
    <button
      class="filter-popup__close"
      (click)="close()"
      type="button"
      aria-label="Close filters"
    >
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <div class="filter-popup__body">
    <div class="fp-group">
      <label class="fp-label">Category</label>
      <div class="fp-options">
        <button
          type="button"
          class="fp-pill"
          [class.fp-pill--active]="filterForm.get('category')?.value === ''"
          (click)="filterForm.get('category')?.setValue('')"
        >
          All
        </button>
        <button
          *ngFor="let cat of categories"
          type="button"
          class="fp-pill"
          [class.fp-pill--active]="
            filterForm.get('category')?.value === cat.slug
          "
          (click)="filterForm.get('category')?.setValue(cat.slug)"
        >
          {{ cat.name }}
        </button>
      </div>
    </div>

    <div class="fp-group">
      <label class="fp-label">Sort By</label>
      <div class="fp-options">
        <button
          type="button"
          class="fp-pill"
          [class.fp-pill--active]="filterForm.get('sortBy')?.value === 'newest'"
          (click)="filterForm.get('sortBy')?.setValue('newest')"
        >
          Newest
        </button>
        <button
          type="button"
          class="fp-pill"
          [class.fp-pill--active]="
            filterForm.get('sortBy')?.value === 'price-asc'
          "
          (click)="filterForm.get('sortBy')?.setValue('price-asc')"
        >
          Price ↑
        </button>
        <button
          type="button"
          class="fp-pill"
          [class.fp-pill--active]="
            filterForm.get('sortBy')?.value === 'price-desc'
          "
          (click)="filterForm.get('sortBy')?.setValue('price-desc')"
        >
          Price ↓
        </button>
        <button
          type="button"
          class="fp-pill"
          [class.fp-pill--active]="
            filterForm.get('sortBy')?.value === 'popular'
          "
          (click)="filterForm.get('sortBy')?.setValue('popular')"
        >
          Popular
        </button>
      </div>
    </div>
  </div>

  <div class="filter-popup__footer">
    <button type="button" class="fp-btn-clear" (click)="onClear()">
      Clear All
    </button>
    <button type="button" class="fp-btn-apply" (click)="onApply()">
      Apply
    </button>
  </div>
</div>
