<div class="cookie-bar" *ngIf="visible()">
  <div class="cookie-bar__inner">
    <div class="cookie-bar__content">
      <i class="fa-solid fa-cookie-bite cookie-bar__icon"></i>
      <div>
        <strong>We use cookies</strong>
        <p>
          We use essential cookies to keep our site running and authentication
          cookies only after you log in or register. Read our
          <a routerLink="/cookie-policy">Cookie Policy</a> to learn more.
        </p>
      </div>
    </div>
    <div class="cookie-bar__actions">
      <button class="cookie-btn cookie-btn--secondary" (click)="decline()">
        Essential only
      </button>
      <button class="cookie-btn cookie-btn--primary" (click)="accept()">
        Accept all
      </button>
    </div>
  </div>
</div>
