<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="fa-solid fa-leaf"></i>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to Veda</p>

    <!-- Google Sign-in -->
    <button class="btn-google" (click)="loginGoogle()" [disabled]="loading()">
      <img
        src="https://www.svgrepo.com/show/475656/google-color.svg"
        width="20"
        height="20"
        alt="Google"
      />
      <span>Continue with Google</span>
    </button>

    <div class="divider"><span>or sign in with email</span></div>

    <!-- Email/Password Form -->
    <form [formGroup]="form" (ngSubmit)="loginEmail()">
      <div class="form-group">
        <label for="login-email">Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input
            id="login-email"
            class="form-input"
            type="email"
            formControlName="email"
            placeholder="you@email.com"
          />
        </div>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input
            id="login-password"
            class="form-input"
            type="password"
            formControlName="password"
            placeholder="••••••••"
          />
        </div>
      </div>

      <p class="auth-error" *ngIf="error()">{{ error() }}</p>

      <button
        class="btn-primary"
        type="submit"
        [disabled]="form.invalid || loading()"
      >
        {{ loading() ? "Signing in..." : "Sign In" }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/auth/register">Create one</a>
    </p>

    <p class="auth-footer">
      <a routerLink="/">← Back to Shop</a>
    </p>
  </div>
</div>
