<!-- Hero — full viewport, emblem only -->
<section class="hero">
  <!-- Sanskrit / Devanagari tagline — sits below navbar, above emblem -->
  <div class="hero__tagline" aria-label="Herbal Based Skin and Hair Care">
    <p class="hero__tagline-devanagari">
      Herbal Based &middot; Skin &amp; Hair Care
    </p>
  </div>

  <!-- Solar-system emblem: 5 orbital rings, one category planet each -->
  <div class="hero__emblem">
    <!-- Sun / core -->
    <a
      routerLink="/products"
      class="emblem__core"
      aria-label="View all products"
    >
      <i class="fa-solid fa-mortar-pestle"></i>
      <span>Aurea</span>
    </a>

    <!-- Orbit 1 — Soap (innermost) -->
    <div class="emblem__orbit emblem__orbit--1"></div>
    <a
      [routerLink]="['/products']"
      [queryParams]="{ category: 'soap' }"
      class="emblem__planet emblem__planet--1"
      aria-label="Browse Soaps"
    >
      <img
        src="assets/icon-soap.svg"
        class="planet-icon"
        alt=""
        aria-hidden="true"
      />
      <span>Soap</span>
    </a>

    <!-- Orbit 2 — Gel -->
    <div class="emblem__orbit emblem__orbit--2"></div>
    <a
      [routerLink]="['/products']"
      [queryParams]="{ category: 'gel' }"
      class="emblem__planet emblem__planet--2"
      aria-label="Browse Gels"
    >
      <img
        src="assets/icon-gel.svg"
        class="planet-icon"
        alt=""
        aria-hidden="true"
      />
      <span>Gel</span>
    </a>

    <!-- Orbit 3 — Cream -->
    <div class="emblem__orbit emblem__orbit--3"></div>
    <a
      [routerLink]="['/products']"
      [queryParams]="{ category: 'cream' }"
      class="emblem__planet emblem__planet--3"
      aria-label="Browse Creams"
    >
      <img
        src="assets/icon-cream.svg"
        class="planet-icon"
        alt=""
        aria-hidden="true"
      />
      <span>Cream</span>
    </a>

    <!-- Orbit 4 — Shampoo -->
    <div class="emblem__orbit emblem__orbit--4"></div>
    <a
      [routerLink]="['/products']"
      [queryParams]="{ category: 'shampoo' }"
      class="emblem__planet emblem__planet--4"
      aria-label="Browse Shampoos"
    >
      <img
        src="assets/icon-shampoo.svg"
        class="planet-icon"
        alt=""
        aria-hidden="true"
      />
      <span>Shampoo</span>
    </a>

    <!-- Orbit 5 — decorative spacer ring -->
    <div class="emblem__orbit emblem__orbit--5"></div>

    <!-- Orbit 6 — Soap (outermost, NEW) -->
    <div class="emblem__orbit emblem__orbit--6"></div>
    <a
      [routerLink]="['/products']"
      [queryParams]="{ category: 'oil' }"
      class="emblem__planet emblem__planet--5"
      aria-label="Browse Oils"
    >
      <img
        src="assets/icon-oil.svg"
        class="planet-icon"
        alt=""
        aria-hidden="true"
      />
      <span>Oil</span>
    </a>
  </div>

  <!-- Single CTA below emblem -->
  <div class="hero__cta">
    <a routerLink="/products" class="btn btn--primary">
      View All Products &rarr;
    </a>
  </div>
</section>
