<!-- Pending payment resume banner -->
<div class="resume-banner" *ngIf="pendingOrderNumber()">
  <div class="resume-banner__body">
    <span class="resume-banner__icon">⚠️</span>
    <div>
      <strong>You have an incomplete payment</strong>
      <p>
        Order <strong>#{{ pendingOrderNumber() }}</strong> is awaiting payment.
        This expires soon.
      </p>
    </div>
  </div>
  <div class="resume-banner__actions">
    <button
      class="resume-banner__btn resume-banner__btn--primary"
      (click)="resumePayment()"
    >
      Resume Payment
    </button>
    <button
      class="resume-banner__btn resume-banner__btn--ghost"
      (click)="dismissPending()"
    >
      Dismiss
    </button>
  </div>
</div>

<!-- Responsive Carousel for Home Page -->
<section class="carousel-section">
  <div class="carousel-wrapper">
    <div
      class="carousel-slide"
      *ngFor="let slide of carouselSlides; let i = index"
      [class.active]="i === currentSlide"
      (click)="onCarouselClick(slide.file)"
      style="cursor: pointer"
    >
      <ng-container *ngIf="slide.file.endsWith('.mp4'); else imageTpl">
        <video
          class="carousel-img"
          [src]="slide.file"
          autoplay
          muted
          loop
          playsinline
        ></video>
      </ng-container>
      <ng-template #imageTpl>
        <img [src]="slide.file" class="carousel-img" />
      </ng-template>
    </div>
    <button
      class="carousel-nav prev"
      (click)="prevSlide()"
      aria-label="Previous slide"
    >
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <button
      class="carousel-nav next"
      (click)="nextSlide()"
      aria-label="Next slide"
    >
      <i class="fa-solid fa-chevron-right"></i>
    </button>
    <div class="carousel-dots">
      <span
        *ngFor="let slide of carouselSlides; let i = index"
        [class.active]="i === currentSlide"
        (click)="goToSlide(i)"
      ></span>
    </div>
  </div>
</section>
