<div class="catalog" [formGroup]="filterForm">
  <div class="container">
    <!-- Catalog Header -->
    <div class="catalog__header">
      <div class="catalog__header-left">
        <!-- Active filter badges -->
        <ng-container *ngIf="filterForm.get('category')?.value">
          <span class="filter-badge">
            {{ getCategoryLabel(filterForm.get("category")?.value ?? "") }}
            <button
              type="button"
              class="filter-badge__remove"
              (click)="filterForm.get('category')?.setValue('')"
              aria-label="Remove category filter"
            >
              ✕
            </button>
          </span>
        </ng-container>
        <ng-container
          *ngIf="
            filterForm.get('sortBy')?.value &&
            filterForm.get('sortBy')?.value !== 'newest'
          "
        >
          <span class="filter-badge">
            {{ getSortLabel(filterForm.get("sortBy")?.value ?? "") }}
            <button
              type="button"
              class="filter-badge__remove"
              (click)="filterForm.get('sortBy')?.setValue('newest')"
              aria-label="Remove sort filter"
            >
              ✕
            </button>
          </span>
        </ng-container>
      </div>
      <div class="catalog__header-right">
        <input
          class="search-input"
          type="search"
          placeholder="Search products..."
          formControlName="search"
        />
        <app-catalog-filter-popup
          [categories]="categories"
          [filterForm]="filterForm"
          (cleared)="resetFilter()"
        />
      </div>
    </div>

    <!-- Skeleton loading grid -->
    <div class="product-grid" *ngIf="isLoading()">
      <div
        class="product-card card skeleton-card"
        *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]"
      >
        <div class="skeleton skeleton--img"></div>
        <div class="product-card__body">
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--price"></div>
          <div class="skeleton skeleton--btn"></div>
        </div>
      </div>
    </div>

    <!-- Product Grid -->
    <ng-container *ngIf="!isLoading()">
      <div
        class="product-grid"
        *ngIf="filteredProducts.length > 0; else noResults"
      >
        <div
          class="product-card card"
          [class.product-card--oos]="!p.inStock || p.stockCount === 0"
          *ngFor="let p of filteredProducts; let i = index"
        >
          <a [routerLink]="['/products', p.id]" class="product-card__img-wrap">
            <!-- First 4 images: eager + high priority (above fold / LCP candidates) -->
            <!-- Rest: lazy loaded -->
            <img
              [src]="p.images[0] | cloudinaryUrl: 300"
              [alt]="p.name"
              [attr.loading]="i < 4 ? null : 'lazy'"
              [attr.fetchpriority]="i === 0 ? 'high' : null"
              width="300"
              height="300"
            />

            <!-- Cart action: + pill or − qty + stepper (inside img-wrap so it positions correctly) -->
            <div
              class="card-cart"
              [class.card-cart--oos]="
                !p.inStock ||
                (getRemainingStock(p) <= 0 && getCartQty(p.id) === 0)
              "
              (click)="$event.preventDefault(); $event.stopPropagation()"
              (keydown.enter)="
                $event.preventDefault(); $event.stopPropagation()
              "
            >
              <!-- Qty stepper (shown when item is in cart) -->
              <div class="card-stepper" *ngIf="getCartQty(p.id) > 0">
                <button
                  class="card-stepper__btn"
                  (click)="removeOne(p)"
                  aria-label="Remove one"
                >
                  −
                </button>
                <span class="card-stepper__qty">{{ getCartQty(p.id) }}</span>
                <button
                  class="card-stepper__btn"
                  (click)="addToCart(p)"
                  [disabled]="getRemainingStock(p) <= 0"
                  aria-label="Add one more"
                >
                  +
                </button>
              </div>

              <!-- Add button (shown when item not in cart) -->
              <button
                class="card-add-btn"
                *ngIf="getCartQty(p.id) === 0"
                (click)="addToCart(p)"
                [disabled]="!p.inStock || p.stockCount === 0"
                [attr.aria-label]="
                  !p.inStock || p.stockCount === 0
                    ? 'Out of stock'
                    : 'Add ' + p.name + ' to cart'
                "
              >
                <span
                  *ngIf="!p.inStock || p.stockCount === 0"
                  class="card-add-btn__oos"
                  >✕</span
                >
                <span *ngIf="p.inStock && p.stockCount > 0">+</span>
              </button>
            </div>
          </a>

          <div class="product-card__body">
            <h4>
              <a [routerLink]="['/products', p.id]">{{ p.name }}</a>
            </h4>
            <div class="product-card__price">
              <span class="price">₹{{ p.price }}</span>
            </div>
          </div>
        </div>
      </div>

      <ng-template #noResults>
        <div class="no-results">
          <span>🫙</span>
          <p>No products match your filters.</p>
          <button class="btn btn--outline" (click)="resetFilter()">
            Clear Filters
          </button>
        </div>
      </ng-template>
    </ng-container>
  </div>
</div>

<!-- Toast -->
<div class="catalog-toast" *ngIf="toastMessage()">
  <i class="fas fa-check-circle"></i> {{ toastMessage() }}
</div>
