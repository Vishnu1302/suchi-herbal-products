<div class="catalog" [formGroup]="filterForm">
  <div class="container">
    <!-- Catalog Header -->
    <div class="catalog__header">
      <div class="catalog__header-left">
        <!-- Active filter badges -->
        <ng-container *ngIf="filterForm.get('category')?.value">
          <span class="filter-badge">
            {{ getCategoryLabel(filterForm.get("category")?.value ?? "") }}
            <button
              type="button"
              class="filter-badge__remove"
              (click)="filterForm.get('category')?.setValue('')"
              aria-label="Remove category filter"
            >
              ✕
            </button>
          </span>
        </ng-container>
        <ng-container
          *ngIf="
            filterForm.get('sortBy')?.value &&
            filterForm.get('sortBy')?.value !== 'newest'
          "
        >
          <span class="filter-badge">
            {{ getSortLabel(filterForm.get("sortBy")?.value ?? "") }}
            <button
              type="button"
              class="filter-badge__remove"
              (click)="filterForm.get('sortBy')?.setValue('newest')"
              aria-label="Remove sort filter"
            >
              ✕
            </button>
          </span>
        </ng-container>
      </div>
      <div class="catalog__header-right">
        <input
          class="search-input"
          type="search"
          placeholder="Search products..."
          formControlName="search"
        />
        <app-catalog-filter-popup
          [categories]="categories"
          [filterForm]="filterForm"
          (cleared)="resetFilter()"
        />
      </div>
    </div>

    <!-- Skeleton loading grid -->
    <div class="product-grid" *ngIf="isLoading()">
      <div
        class="product-card card skeleton-card"
        *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]"
      >
        <div class="skeleton skeleton--img"></div>
        <div class="product-card__body">
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--price"></div>
          <div class="skeleton skeleton--btn"></div>
        </div>
      </div>
    </div>

    <!-- Product Grid -->
    <ng-container *ngIf="!isLoading()">
      <div
        class="product-grid"
        *ngIf="filteredProducts.length > 0; else noResults"
      >
        <div
          class="product-card card"
          [class.product-card--oos]="!p.inStock || p.stockCount === 0"
          *ngFor="let p of filteredProducts; let i = index"
        >
          <a [routerLink]="['/products', p.id]" class="product-card__img-wrap">
            <!-- First 4 images: eager + high priority (above fold / LCP candidates) -->
            <!-- Rest: lazy loaded -->
            <img
              [src]="p.images[0] | cloudinaryUrl: 300"
              [alt]="p.name"
              [attr.loading]="i < 4 ? null : 'lazy'"
              [attr.fetchpriority]="i === 0 ? 'high' : null"
              width="300"
              height="300"
            />
          </a>
          <div class="product-card__body">
            <h4>
              <a [routerLink]="['/products', p.id]">{{ p.name }}</a>
            </h4>
            <div class="product-card__price">
              <span class="price">₹{{ p.price }}</span>
            </div>
            <button
              class="btn btn--primary btn--sm"
              (click)="addToCart(p)"
              [disabled]="!p.inStock || getRemainingStock(p) <= 0"
            >
              {{
                !p.inStock || p.stockCount === 0
                  ? "Out of Stock"
                  : "Add to Cart"
              }}
            </button>
          </div>
        </div>
      </div>

      <ng-template #noResults>
        <div class="no-results">
          <span>🫙</span>
          <p>No products match your filters.</p>
          <button class="btn btn--outline" (click)="resetFilter()">
            Clear Filters
          </button>
        </div>
      </ng-template>
    </ng-container>
  </div>
</div>

<!-- Toast -->
<div class="catalog-toast" *ngIf="toastMessage()">
  <i class="fas fa-check-circle"></i> {{ toastMessage() }}
</div>
