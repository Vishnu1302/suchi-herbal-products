<ng-template #loadingTpl>
  <div class="loading">Loading product...</div>
</ng-template>
<div class="detail container" *ngIf="product() as p; else loadingTpl">
  <a routerLink="/products" class="back-link">← Back to Shop</a>

  <div class="detail__layout">
    <!-- Image Gallery -->
    <div class="detail__gallery">
      <img
        [src]="selectedImage() | cloudinaryUrl: 600"
        [alt]="p.name"
        class="detail__main-img"
      />
      <div class="detail__thumbs">
        <button
          *ngFor="let img of p.images"
          type="button"
          class="detail__thumb"
          [class.active]="img === selectedImage()"
          (click)="selectedImage.set(img)"
          [attr.aria-label]="'Show image ' + p.name"
        >
          <img [src]="img | cloudinaryUrl: 100" [alt]="p.name" loading="lazy" />
        </button>
      </div>
    </div>

    <!-- Info Panel -->
    <div class="detail__info">
      <h1>{{ p.name }}</h1>

      <div class="detail__price">
        <span class="price">₹{{ p.price }}</span>
      </div>

      <p class="detail__description">{{ p.description }}</p>

      <!-- In-stock: quantity selector + action buttons -->
      <ng-container *ngIf="p.inStock && p.stockCount > 0; else outOfStockTpl">
        <form [formGroup]="form">
          <div class="detail__qty">
            <label class="qty-label">Quantity</label>
            <div class="qty-controls">
              <button
                type="button"
                class="qty-btn"
                (click)="decQty()"
                [disabled]="form.controls['qty'].value <= 1"
                aria-label="Decrease quantity"
              >
                −
              </button>
              <span class="qty-value">{{ form.controls["qty"].value }}</span>
              <button
                type="button"
                class="qty-btn"
                (click)="incQty()"
                [disabled]="form.controls['qty'].value >= remainingStock"
                aria-label="Increase quantity"
              >
                +
              </button>
            </div>
          </div>

          <p class="size-error" *ngIf="sizeError()">{{ sizeError() }}</p>

          <div class="detail__actions">
            <button
              type="button"
              class="btn btn--primary"
              (click)="addToCart(p)"
              [disabled]="!form.valid || remainingStock === 0"
            >
              Add to Cart
            </button>
          </div>
        </form>
      </ng-container>

      <ng-template #outOfStockTpl>
        <div class="detail__actions">
          <button type="button" class="btn btn--primary" disabled>
            Out of Stock
          </button>
        </div>
      </ng-template>

      <!-- Toast notification -->
      <div class="detail__toast" *ngIf="toast()">
        {{ toast() }}
      </div>
    </div>
  </div>

  <ng-template #loadingTpl>
    <div class="loading">Loading product...</div>
  </ng-template>
</div>
