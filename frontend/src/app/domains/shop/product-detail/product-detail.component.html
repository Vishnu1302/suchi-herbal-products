<ng-template #loadingTpl>
  <div class="loading">Loading product...</div>
</ng-template>
<div class="detail container" *ngIf="product() as p; else loadingTpl">
  <a routerLink="/products" class="back-link">← Back to Shop</a>

  <div class="detail__layout">
    <!-- Image Gallery -->
    <div class="detail__gallery">
      <img [src]="selectedImage()" [alt]="p.name" class="detail__main-img" />
      <div class="detail__thumbs">
        <button
          *ngFor="let img of p.images"
          type="button"
          class="detail__thumb"
          [class.active]="img === selectedImage()"
          (click)="selectedImage.set(img)"
          [attr.aria-label]="'Show image ' + p.name"
        >
          <img [src]="img" [alt]="p.name" />
        </button>
      </div>
    </div>

    <!-- Info Panel -->
    <div class="detail__info">
      <!-- Herbal products: no badge -->
      <h1>{{ p.name }}</h1>
      <p class="detail__meta">
        {{ p.category | titlecase }}
      </p>

      <div class="detail__price">
        <span class="price">₹{{ p.price }}</span>
        <!-- No originalPrice/discount for herbal products -->
      </div>

      <p class="detail__description">{{ p.description }}</p>

      <!-- Size + Qty: only when in stock AND sizes are configured -->

      <!-- Herbal products: only quantity selection -->
      <form [formGroup]="form" *ngIf="p.inStock && p.stockCount > 0">
        <div class="detail__qty">
          <label for="qty-input">Qty</label>
          <div class="qty-controls">
            <button
              type="button"
              (click)="decQty()"
              [disabled]="form.controls['qty'].value <= 1"
            >
              -
            </button>
            <input
              id="qty-input"
              type="number"
              formControlName="qty"
              min="1"
              [max]="remainingStock"
            />
            <button
              type="button"
              (click)="incQty()"
              [disabled]="form.controls['qty'].value >= remainingStock"
            >
              +
            </button>
          </div>
        </div>
        <div class="stock-info">
          <span
            >{{ remainingStock }} unit{{
              remainingStock === 1 ? "" : "s"
            }}
            available</span
          >
        </div>
        <button
          type="button"
          class="btn btn--primary"
          (click)="addToCart(p)"
          [disabled]="!form.valid || !p.inStock || remainingStock === 0"
        >
          <i class="fas fa-cart-plus"></i> Add to Cart
        </button>
        <button
          type="button"
          class="btn btn--secondary"
          (click)="buyNow(p)"
          [disabled]="!form.valid || !p.inStock || remainingStock === 0"
        >
          <i class="fas fa-bolt"></i> Buy Now
        </button>
      </form>

      <!-- Toast notification -->
      <div class="detail__toast" *ngIf="toast()">
        {{ toast() }}
      </div>
    </div>
  </div>

  <ng-template #loadingTpl>
    <div class="loading">Loading product...</div>
  </ng-template>
</div>
